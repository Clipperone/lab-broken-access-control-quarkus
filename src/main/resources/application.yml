quarkus:

  # Deny-by-default (defense in depth): ogni endpoint JAX-RS PRIVO di annotazione di sicurezza
  # (@RolesAllowed / @PermitAll / @Authenticated / @DenyAll) viene NEGATO automaticamente.
  # Mitiga in modo strutturale la classe "Missing Function Level Access Control" (vuln BONUS X):
  # dimenticare l'annotazione non lascia più un endpoint pubblico per errore.
  security:
    jaxrs:
      deny-unannotated-endpoints: true

  datasource:
    db-kind: h2
    jdbc:
      driver: org.h2.Driver
      url: jdbc:h2:mem:labbac;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS LAB_BAC

  hibernate-orm:
    log:
      sql: true


  # Console H2 per debug (solo in dev)
  h2:
    console:
      enabled: true

smallrye:
  jwt:
    sign:
      issuer: https://unittestdemoapp.fugerit.org
      key:
        location: /security/privateKey.pem

mp:
  jwt:
    verify:
      issuer: https://unittestdemoapp.fugerit.org
      publickey:
        location: /security/publicKey.pem


